name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 00:00 UTC to catch regressions
    - cron: '0 0 * * *'

jobs:
  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          libdbus-1-3 \
          libsecret-1-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify keyring backend availability
      run: |
        python -c "import keyring; print(f'Keyring backend: {keyring.get_keyring()}')"

    - name: Lint with flake8
      run: |
        flake8 src/configcrypt --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/configcrypt --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Check code formatting with black
      run: |
        black --check src/configcrypt tests

    - name: Type check with mypy
      run: |
        mypy src/configcrypt --ignore-missing-imports
      continue-on-error: true

    - name: Run unit tests
      run: |
        pytest tests/unit -v --cov=configcrypt --cov-report=xml --cov-report=term-missing
      timeout-minutes: 10

    - name: Run CLI tests
      run: |
        pytest tests/cli -v --tb=short
      timeout-minutes: 5

    - name: Run GUI tests (with display server)
      if: runner.os == 'Linux'
      run: |
        xvfb-run -a pytest tests/gui -v --tb=short
      timeout-minutes: 10

    - name: Run GUI tests (native)
      if: runner.os != 'Linux'
      run: |
        pytest tests/gui -v --tb=short
      timeout-minutes: 10
      continue-on-error: true

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  property-tests:
    name: Property-Based Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run property-based tests with hypothesis
      run: |
        pytest tests/unit -v -m property --hypothesis-show-statistics --hypothesis-profile=ci
      timeout-minutes: 30
      env:
        HYPOTHESIS_PROFILE: ci

  integration-tests:
    name: Integration Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsecret-1-0 libdbus-1-3

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Keychain integration tests
      run: |
        pytest tests/ -v -m integration --tb=short
      timeout-minutes: 10

    - name: Test cross-platform file format compatibility
      run: |
        pytest tests/ -v -k "test_cross_platform" --tb=short
      timeout-minutes: 5

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run performance benchmarks
      run: |
        pytest tests/ -v -m benchmark --tb=short
      timeout-minutes: 15

    - name: Generate performance report
      if: always()
      run: |
        echo "Performance test results available in job logs"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run safety check (dependencies)
      run: |
        safety check --json || true

    - name: Run bandit (code security)
      run: |
        bandit -r src/configcrypt -f json -o bandit-report.json || true
        cat bandit-report.json

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
